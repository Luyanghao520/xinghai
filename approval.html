<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册审批 · 星海工作端</title>
<style>
        :root{--navy:#1B2645;--blue:#3D5F8A;--gold:#C09641;--gold-2:#E4C87E;--ink:#1E2433;--sub:#6B7394;--line:#E6E9F2;--bg:#F0F2FA;--card:#FFFFFF;--grad-hero:linear-gradient(160deg,#11162D 0%,#1B2645 35%,#253255 65%,#1E2A3E 100%);--iride-1:rgba(186,205,255,.55);--iride-2:rgba(220,196,255,.5);--iride-3:rgba(255,200,224,.5);--iride-4:rgba(255,224,196,.5);--iride-5:rgba(196,255,224,.5);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#F5F0FA 0%,#F0F4FF 25%,#FFF5F8 50%,#F8FFF0 75%,#FFF9F0 100%);position:relative;color:var(--ink);line-height:1.6;position:relative;overflow-x:hidden;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(circle at 15% 20%,var(--iride-1),transparent 45%),
               radial-gradient(circle at 85% 50%,var(--iride-2),transparent 45%),
               radial-gradient(circle at 50% 85%,var(--iride-3),transparent 45%),
               radial-gradient(circle at 30% 70%,var(--iride-4),transparent 40%),
               radial-gradient(circle at 75% 25%,var(--iride-5),transparent 40%);}

  /* ── 背景装饰光斑 ── */
  body::before{content:'';position:fixed;top:-160px;right:-80px;width:500px;height:500px;background:radial-gradient(circle at 30% 40%,rgba(212,162,78,.10),transparent 70%);border-radius:50%;pointer-events:none;z-index:0;animation:spot1 9s ease-in-out infinite;}
  body::after{content:'';position:fixed;bottom:-140px;left:-100px;width:440px;height:440px;background:radial-gradient(circle at 60% 50%,rgba(59,108,181,.09),transparent 70%);border-radius:50%;pointer-events:none;z-index:0;animation:spot2 11s ease-in-out infinite;}
  .spot{position:fixed;top:50%;left:50%;width:520px;height:520px;transform:translate(-50%,-50%);background:radial-gradient(circle at 50% 50%,rgba(212,162,78,.035),transparent 60%);border-radius:50%;pointer-events:none;z-index:0;}
  @keyframes spot1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(22px,-16px) scale(1.04);}}
  @keyframes spot2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-20px,14px) scale(1.05);}}

  /* ── 顶栏（玻璃态）── */
  header{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;padding:14px 24px;background:rgba(255,255,255,.68);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);background:rgba(255,255,255,.97);border-bottom:2px solid #DDE2EC;box-shadow:0 4px 16px rgba(11,30,61,.08);}
  .brand{font-weight:800;font-size:16px;color:var(--navy);letter-spacing:1px;}
  .brand span{color:var(--gold);}
  .crumb{font-size:12.5px;color:var(--sub);}.crumb a{color:var(--blue);text-decoration:none;transition:color .2s;}.crumb a:hover{color:var(--navy);}
  .user{margin-left:auto;font-size:13px;color:var(--sub);}.user b{color:var(--navy);}.user a{margin-left:12px;color:var(--blue);text-decoration:none;font-weight:600;transition:color .2s;}.user a:hover{color:var(--navy);}

  /* ── 主容器 ── */
  .wrap{max-width:1060px;margin:28px auto;padding:0 20px;position:relative;z-index:1;}
  .count{font-size:12.5px;color:var(--sub);margin-bottom:14px;font-weight:600;}

  /* ── 表格（圆角 + 斑马纹 + hover）── */
  .tablewrap{background:#FFFFFF;border:1.5px solid #DDE2EC;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(11,30,61,.08),0 2px 6px rgba(11,30,61,.04);}
  .scroll{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:680px;}
  th,td{border-bottom:1px solid rgba(228,234,243,.6);padding:11px 13px;text-align:left;vertical-align:middle;}
  th{background:linear-gradient(180deg,var(--navy),#0F2547);color:#fff;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;position:sticky;top:0;z-index:2;}
  tbody tr:nth-child(even){background:rgba(245,247,251,.5);}
  tbody tr:hover{background:rgba(59,108,181,.05);transition:background .15s;}

  /* ── 状态标签 ── */
  .tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.3px;}
  .tag.wait{background:rgba(251,241,220,.9);color:#B5860B;}
  .tag.ok{background:rgba(231,246,236,.9);color:var(--ok);}
  .tag.no{background:rgba(253,236,235,.9);color:var(--red);}

  /* ── 操作链接 ── */
  .op{color:var(--blue);cursor:pointer;text-decoration:none;margin-right:8px;font-weight:600;font-size:12px;padding:3px 8px;border-radius:6px;transition:all .2s;}
  .op:hover{background:rgba(59,108,181,.08);text-decoration:underline;}
  .op.no{color:var(--red);}.op.no:hover{background:rgba(220,74,61,.08);}
  .op.dis{color:#B0B8C5;cursor:default;text-decoration:none;}
  .op.dis:hover{background:transparent;text-decoration:none;}

  .empty{text-align:center;color:#B0B8C5;padding:42px;font-size:13px;}

  /* ── Toast ── */
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:rgba(11,30,61,.92);backdrop-filter:blur(12px);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;opacity:0;transition:.3s ease;z-index:90;pointer-events:none;box-shadow:0 8px 30px rgba(11,30,61,.25);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:640px){header{padding:12px 16px;gap:8px;}.wrap{margin:16px auto;padding:0 12px;}}
</style>
</head>
<body>
<div class="spot"></div>
<header>
  <div class="brand">星海艺术团工作端</div>
  <a href="#" onclick="history.back();return false" style="color:var(--blue);font-size:12.5px;text-decoration:none;font-weight:600;padding:4px 10px;border-radius:8px;border:1.5px solid #DDE2EC">← 返回</a><div class="crumb"><a href="/work">总览</a> / 注册审批</div>
  <div class="user">你好，<b id="uname">—</b>（<span id="urole">—</span>） <a href="/logout">登出</a></div>
</header>
<div class="wrap">
  <div class="count" id="count">—</div>
  <div class="tablewrap"><div class="scroll">
    <table>
      <thead><tr><th>ID</th><th>学号</th><th>姓名</th><th>校区</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="7" class="empty">加载中…</td></tr></tbody>
    </table>
  </div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
fetch('/api/me').then(r=>r.json()).then(d=>{
  if(!d.ok){location.href='/login';return;}
  $('uname').textContent=d.name;$('urole').textContent=d.role;
  if(d.role!=='主席'&&d.role!=='副主席'){
    document.querySelector('.wrap').innerHTML='<div class="empty">仅主席 / 副主席可审批注册</div>';return;
  }
  load();
});
function statusTag(s){return s==='通过'?'<span class="tag ok">通过</span>':s==='驳回'?'<span class="tag no">驳回</span>':'<span class="tag wait">待审</span>';}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function load(){
  fetch('/api/register').then(r=>r.json()).then(rows=>{
    if(rows.ok===false){document.querySelector('.wrap').innerHTML='<div class="empty">'+rows.error+'</div>';return;}
    $('count').textContent='共 '+rows.length+' 条';
    const tb=$('tbody');
    if(!rows.length){tb.innerHTML='<tr><td colspan="7" class="empty">暂无注册申请</td></tr>';return;}
    tb.innerHTML=rows.map(r=>{
      const ops = r.status==='待审'
        ? '<span class="op" onclick="act('+r.id+',\'approve\')">通过</span><span class="op no" onclick="act('+r.id+',\'reject\')">驳回</span>'
        : '<span class="op dis">—</span>';
      return '<tr><td>'+r.id+'</td><td>'+r.xh+'</td><td>'+r.name+'</td><td>'+(r.campus||'—')+
        '</td><td>'+statusTag(r.status)+'</td><td>'+(r.created||'—')+'</td><td>'+ops+'</td></tr>';
    }).join('');
  });
}
function act(id,st){
  if(!confirm(st==='approve'?'确认通过该注册申请？':'确认驳回该申请？'))return;
  fetch('/api/register/'+id+'/'+st,{method:'POST'}).then(r=>r.json()).then(res=>{
    if(res.ok){toast(st==='approve'?'已通过，账号已创建':'已驳回');load();}
    else toast(res.error||'操作失败');
  });
}
</script>
</body>
</html>
