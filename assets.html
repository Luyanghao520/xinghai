<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产管理 · 星海工作端</title>
<style>
        :root{--navy:#1B2645;--blue:#3D5F8A;--gold:#C09641;--gold-2:#E4C87E;--ink:#1E2433;--sub:#6B7394;--line:#E6E9F2;--bg:#F0F2FA;--card:#FFFFFF;--grad-hero:linear-gradient(160deg,#11162D 0%,#1B2645 35%,#253255 65%,#1E2A3E 100%);--iride-1:rgba(186,205,255,.55);--iride-2:rgba(220,196,255,.5);--iride-3:rgba(255,200,224,.5);--iride-4:rgba(255,224,196,.5);--iride-5:rgba(196,255,224,.5);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background:linear-gradient(135deg,#F5F0FA 0%,#F0F4FF 25%,#FFF5F8 50%,#F8FFF0 75%,#FFF9F0 100%);position:relative;
    color: var(--ink); line-height: 1.6; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; top: -180px; right: -120px; width: 460px; height: 460px;
    background: radial-gradient(circle, rgba(43,87,154,.06) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; bottom: -100px; left: -80px; width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(212,162,78,.07) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }

  /* ===== 顶栏 - 玻璃态 ===== */
  header {
    position: sticky; top: 0; z-index: 60;
    display: flex; align-items: center; gap: 16px;
    padding: 12px 28px;
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(228,234,242,.6);
    box-shadow: 0 1px 8px rgba(15,42,82,.04);
  }
  .brand { font-weight: 800; font-size: 17px; color: var(--navy); letter-spacing: .5px; }
  .brand span { color: var(--gold); margin: 0 2px; }
  .crumb { font-size: 12.5px; color: var(--sub); }
  .crumb a { color: var(--blue); text-decoration: none; transition: var(--trans); }
  .crumb a:hover { color: var(--gold); }
  .user { margin-left: auto; font-size: 13px; color: var(--sub); display: flex; align-items: center; gap: 4px; }
  .user b { color: var(--navy); }
  .user a {
    margin-left: 8px; color: var(--blue); text-decoration: none; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; background: rgba(43,87,154,.06);
    transition: var(--trans);
  }
  .user a:hover { background: rgba(43,87,154,.14); color: var(--navy); }

  /* ===== 内容区 ===== */
  .wrap { max-width: 1040px; margin: 24px auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ===== 标签页 - 现代设计 ===== */
  .tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
    background: var(--card-glass); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    padding: 5px; box-shadow: var(--shadow-sm);
  }
  .tabs button {
    border: none; background: transparent; padding: 11px 22px;
    font-size: 13.5px; cursor: pointer; color: var(--sub); font-weight: 600;
    flex: 1; border-radius: 16px; transition: var(--trans);
    position: relative; letter-spacing: .3px;
  }
  .tabs button:hover { color: var(--navy); background: rgba(15,42,82,.05); }
  .tabs button.on {
    background: linear-gradient(135deg, var(--navy) 0%, #1a4580 100%);
    color: #fff; box-shadow: 0 4px 14px rgba(15,42,82,.25);
    transform: translateY(-1px);
  }

  /* ===== 标签内容 ===== */
  .tab { display: none; animation: fadeSlide .35s ease; }
  .tab.on { display: block; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== 操作栏 ===== */
  .bar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px;
  }

  /* ===== 按钮统一风格 ===== */
  .btn {
    border: none; border-radius: var(--radius-sm); padding: 10px 20px;
    font-size: 13.5px; font-weight: 700; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, var(--navy) 0%, #1a4580 100%);
    box-shadow: 0 2px 8px rgba(15,42,82,.18);
    transition: var(--trans); letter-spacing: .3px;
  }
  .btn:hover { box-shadow: 0 6px 20px rgba(15,42,82,.28); transform: translateY(-1px); }
  .btn:active { transform: scale(.97); box-shadow: 0 1px 4px rgba(15,42,82,.15); }
  .btn.sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
  .btn.ghost {
    background: rgba(255,255,255,.85); color: var(--blue);
    border: 1.5px solid #DDE2EC; box-shadow: none;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .btn.ghost:hover { background: #fff; border-color: var(--blue); box-shadow: var(--shadow-sm); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* filter select 统一 */
  .bar select {
    padding: 9px 14px; border: 1.5px solid #DDE2EC; border-radius: var(--radius-sm);
    font-size: 13px; background: var(--card-glass); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); outline: none; color: var(--ink);
    cursor: pointer; transition: var(--trans);
  }
  .bar select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(43,87,154,.08); }

  .count {
    font-size: 12.5px; color: var(--sub); margin-left: auto;
    padding: 5px 14px; background: var(--card-glass); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); border-radius: 20px; border: 1.5px solid #DDE2EC;
  }

  /* ===== 表单弹窗 - 玻璃态 ===== */
  .form {
    background: var(--card-glass); backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border); border-radius: var(--radius-md);
    padding: 20px 22px; margin-bottom: 16px; display: none;
    box-shadow: var(--shadow-md);
  }
  .form.open { display: block; animation: fadeSlide .3s ease; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  .fld { display: flex; flex-direction: column; }
  .fld.full { grid-column: 1/-1; }
  .fld label { font-size: 12px; color: var(--navy); font-weight: 700; margin-bottom: 5px; letter-spacing: .3px; }
  .fld input, .fld select {
    padding: 10px 13px; border: 1.5px solid #DDE2EC; border-radius: var(--radius-sm);
    font-size: 13px; background: rgba(255,255,255,.7); outline: none;
    transition: var(--trans); color: var(--ink);
  }
  .fld input::placeholder { color: #bcc4d0; }
  .fld input:focus, .fld select:focus {
    border-color: var(--blue); background: #fff;
    box-shadow: 0 0 0 4px rgba(43,87,154,.07);
  }
  .err { color: #E0564B; font-size: 12px; min-height: 14px; margin-top: 8px; }
  .mfoot { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

  /* ===== 表格容器 ===== */
  .tablewrap {
    background: var(--card-glass); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border); border-radius: var(--radius-md);
    overflow: hidden; box-shadow: var(--shadow-md);
  }
  .scroll { overflow-x: auto; }

  /* ===== 表格精致设计 ===== */
  table {
    border-collapse: separate; border-spacing: 0;
    width: 100%; font-size: 13px; min-width: 600px;
  }
  thead th {
    background: linear-gradient(180deg, #122D58 0%, var(--navy) 100%);
    color: #fff; font-weight: 700; font-size: 12.5px; letter-spacing: .5px;
    padding: 13px 12px; text-align: left; white-space: nowrap;
    border-bottom: 2px solid rgba(212,162,78,.3);
  }
  thead th:first-child { border-radius: var(--radius-md) 0 0 0; }
  thead th:last-child { border-radius: 0 var(--radius-md) 0 0; }
  tbody td {
    padding: 12px; border-bottom: 1px solid rgba(228,234,242,.5);
    vertical-align: middle; transition: var(--trans);
  }
  tbody tr:last-child td:first-child { border-radius: 0 0 0 var(--radius-md); }
  tbody tr:last-child td:last-child { border-radius: 0 0 var(--radius-md) 0; }
  /* stripe */
  tbody tr:nth-child(even) { background: rgba(245,248,252,.5); }
  tbody tr:nth-child(odd) { background: rgba(255,255,255,.4); }
  /* hover 高亮 */
  tbody tr:hover { background: rgba(43,87,154,.08) !important; }
  tbody tr:hover td { border-bottom-color: rgba(43,87,154,.15); }
  tbody td b { color: var(--navy); }

  /* ===== 标签徽章 ===== */
  .tag {
    display: inline-block; font-size: 11px; padding: 3px 10px;
    border-radius: 20px; font-weight: 700; letter-spacing: .3px;
    white-space: nowrap;
  }
  .tag.green  { background: #DCF5E6; color: #1E7B46; }
  .tag.yellow { background: #FDF0D5; color: #9B720D; }
  .tag.red    { background: #FDE8E7; color: #C0392B; }
  .tag.gray   { background: #EEF0F4; color: #5A6377; }

  /* ===== 操作链接 ===== */
  .op {
    display: inline-block; color: var(--blue); cursor: pointer;
    font-weight: 600; font-size: 12px; margin-right: 8px; padding: 2px 0;
    background: none; border: none; transition: var(--trans);
  }
  .op:hover { color: var(--navy); text-decoration: underline; }
  .op.del { color: #C0392B; }
  .op.del:hover { color: #A01D1B; }
  .op.dis { color: #bcc4d0; cursor: default; }
  .op.dis:hover { text-decoration: none; color: #bcc4d0; }

  /* ===== 空状态 ===== */
  .empty { text-align: center; color: #aeb8c6; padding: 48px 24px; font-size: 13.5px; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: 36px;
    transform: translateX(-50%) translateY(24px);
    background: linear-gradient(135deg, var(--navy), #1a4580);
    color: #fff; padding: 12px 24px; border-radius: 30px;
    font-size: 13.5px; font-weight: 600; letter-spacing: .3px;
    opacity: 0; transition: .35s cubic-bezier(.4,0,.2,1); z-index: 90;
    pointer-events: none; box-shadow: 0 12px 40px rgba(15,42,82,.35);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .grid2 { grid-template-columns: 1fr; }
    header { padding: 10px 16px; gap: 10px; }
    .tabs button { padding: 10px 14px; font-size: 12.5px; }
    .wrap { padding: 0 12px; margin: 16px auto; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">星海艺术团工作端</div>
  <a href="#" onclick="history.back();return false" style="color:var(--blue);font-size:12.5px;text-decoration:none;font-weight:600;padding:4px 10px;border-radius:8px;border:1.5px solid #DDE2EC">← 返回</a><div class="crumb"><a href="/work">总览</a> / 资产管理</div>
  <div class="user">你好，<b id="uname">—</b>（<span id="urole">—</span>） <a href="/logout">登出</a></div>
</header>
<div class="wrap">
  <div class="tabs">
    <button id="tAsset" class="on" onclick="switchTab('asset')">📦 资产列表</button>
    <button id="tBorrow" onclick="switchTab('borrow')">📋 借还记录</button>
    <button id="tProc" onclick="switchTab('proc')">🛒 采购申请</button>
  </div>

  <!-- 资产列表 -->
  <div class="tab on" id="tabAsset">
    <div class="bar">
      <button class="btn" onclick="toggleForm()">＋ 登记资产</button>
      <select id="filtCat" onchange="loadAssets()"><option value="">全部类别</option><option>器材</option><option>服装</option><option>道具</option><option>其他</option></select>
      <select id="filtSt" onchange="loadAssets()"><option value="">全部状态</option><option>在库</option><option>借出</option><option>报修</option><option>报废</option></select>
      <span class="count" id="assetCount">—</span>
    </div>
    <div class="form" id="assetForm">
      <div class="grid2">
        <div class="fld"><label>名称 *</label><input id="af_name" placeholder="如 合唱团演出服"></div>
        <div class="fld"><label>类别</label><select id="af_cat"><option>器材</option><option>服装</option><option>道具</option><option>其他</option></select></div>
        <div class="fld"><label>数量</label><input id="af_qty" type="number" min="1" value="1"></div>
        <div class="fld"><label>存放位置</label><input id="af_loc" placeholder="如 排练厅A柜"></div>
        <div class="fld"><label>负责人</label><input id="af_per" placeholder="姓名"></div>
      </div>
      <input type="hidden" id="af_id">
      <div class="err" id="afErr"></div>
      <div class="mfoot"><button class="btn ghost" onclick="toggleForm()">取消</button><button class="btn" id="afBtn" onclick="saveAsset()">保存</button></div>
    </div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>ID</th><th>名称</th><th>类别</th><th>数量</th><th>位置</th><th>负责人</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="assetBody"><tr><td colspan="8" class="empty">加载中…</td></tr></tbody>
    </table></div></div>
  </div>

  <!-- 借还记录 -->
  <div class="tab" id="tabBorrow">
    <div class="bar"><span class="count" id="borrowCount">—</span></div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>ID</th><th>资产</th><th>借用人</th><th>数量</th><th>借出日</th><th>归还日</th><th>状态</th><th>备注</th></tr></thead>
      <tbody id="borrowBody"><tr><td colspan="8" class="empty">加载中…</td></tr></tbody>
    </table></div></div>
  </div>

  <!-- 采购申请 -->
  <div class="tab" id="tabProc">
    <div class="bar">
      <button class="btn" onclick="toggleProcForm()">＋ 采购申请</button>
      <span class="count" id="procCount">—</span>
    </div>
    <div class="form" id="procForm">
      <div class="grid2">
        <div class="fld"><label>物品名称 *</label><input id="pf_name" placeholder="如 无线话筒"></div>
        <div class="fld"><label>类别</label><select id="pf_cat"><option>器材</option><option>服装</option><option>道具</option><option>其他</option></select></div>
        <div class="fld"><label>数量</label><input id="pf_qty" type="number" min="1" value="1"></div>
        <div class="fld full"><label>申请理由</label><input id="pf_reason" placeholder="为什么需要采购"></div>
      </div>
      <div class="err" id="pfErr"></div>
      <div class="mfoot"><button class="btn ghost" onclick="toggleProcForm()">取消</button><button class="btn" id="pfBtn" onclick="saveProc()">提交申请</button></div>
    </div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>ID</th><th>物品</th><th>类别</th><th>数量</th><th>理由</th><th>申请人</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="procBody"><tr><td colspan="8" class="empty">加载中…</td></tr></tbody>
    </table></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let role='', uid='', curTab='asset';
const $=id=>document.getElementById(id);
fetch('/api/me').then(r=>r.json()).then(d=>{
  if(!d.ok){location.href='/login';return;}
  $('uname').textContent=d.name;$('urole').textContent=d.role;role=d.role;uid=d.uid;loadAssets();
});
function switchTab(t){curTab=t;$('tAsset').classList.toggle('on',t==='asset');$('tBorrow').classList.toggle('on',t==='borrow');$('tProc').classList.toggle('on',t==='proc');
  ['asset','borrow','proc'].forEach(k=>$('tab'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('on',k===t));
  if(t==='asset')loadAssets();if(t==='borrow')loadBorrows();if(t==='proc')loadProcs();}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function tag(s){return s==='在库'?'tag green':s==='借出'?'tag yellow':s==='报修'?'tag red':s==='报废'?'tag gray':s==='已归还'?'tag green':s==='通过'?'tag green':s==='驳回'?'tag red':'tag yellow';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ===== 资产列表 =====
function toggleForm(){const f=$('assetForm');f.classList.toggle('open');if(!f.classList.contains('open')){$('af_id').value='';$('af_name').value='';$('af_cat').value='器材';$('af_qty').value='1';$('af_loc').value='';$('af_per').value='';$('afErr').textContent='';}}
function loadAssets(){
  const p=new URLSearchParams();const cat=$('filtCat').value,st=$('filtSt').value;if(cat)p.set('category',cat);if(st)p.set('status',st);
  fetch('/api/assets?'+p.toString()).then(r=>r.json()).then(rows=>{
    $('assetCount').textContent='共 '+rows.length+' 件';
    const tb=$('assetBody');
    if(!rows.length){tb.innerHTML='<tr><td colspan="8" class="empty">暂无资产</td></tr>';return;}
    tb.innerHTML=rows.map(r=>{
      let ops='<span class="op" onclick="editAsset('+r.id+',\''+esc(r.name)+'\',\''+esc(r.category||'')+'\','+r.qty+',\''+esc(r.location||'')+'\',\''+esc(r.person||'')+'\')">编辑</span>';
      if(r.status==='在库')ops+='<span class="op" onclick="borrowAsset('+r.id+',\''+esc(r.name)+'\')">借出</span>';
      if(r.status==='借出')ops+='<span class="op" onclick="returnAsset('+r.id+')">归还</span>';
      if(r.status==='在库'||r.status==='借出')ops+='<span class="op" onclick="repairAsset('+r.id+')">报修</span>';
      if(role==='主席'||role==='副主席')ops+='<span class="op del" onclick="scrapAsset('+r.id+')">报废</span><span class="op del" onclick="delAsset('+r.id+')">删除</span>';
      return '<tr><td>'+r.id+'</td><td><b>'+esc(r.name)+'</b></td><td>'+esc(r.category||'—')+'</td><td>'+r.qty+'</td><td>'+esc(r.location||'—')+'</td><td>'+esc(r.person||'—')+'</td><td><span class="'+tag(r.status)+'">'+esc(r.status)+'</span></td><td>'+ops+'</td></tr>';
    }).join('');
  });
}
function editAsset(id,name,cat,qty,loc,per){$('af_id').value=id;$('af_name').value=name;$('af_cat').value=cat;$('af_qty').value=qty;$('af_loc').value=loc;$('af_per').value=per;$('assetForm').classList.add('open');}
function saveAsset(){
  const d={name:$('af_name').value.trim(),category:$('af_cat').value,qty:$('af_qty').value,location:$('af_loc').value.trim(),person:$('af_per').value.trim()};
  if(!d.name){$('afErr').textContent='请输入资产名称';return;}
  const id=$('af_id').value,url='/api/assets'+(id?'/'+id:''),m=id?'PUT':'POST';
  fetch(url,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).then(res=>{
    if(res.ok){toast(id?'已更新':'已登记');toggleForm();loadAssets();}else{$('afErr').textContent=res.error||'失败';}
  });
}
function delAsset(id){if(!confirm('确认删除该资产？'))return;fetch('/api/assets/'+id,{method:'DELETE'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已删除');loadAssets();}else alert(res.error);});}
function borrowAsset(id,name){const q=prompt('借出数量（默认1）：','1');const d=prompt('借出日期（如 2026-09-01，留空=今天）：');if(q===null)return;
  fetch('/api/assets/'+id+'/borrow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qty:parseInt(q)||1,borrow_date:d,note:''})})
  .then(r=>r.json()).then(res=>{if(res.ok){toast('已借出：'+name);loadAssets();}else alert(res.error);});}
function returnAsset(id){fetch('/api/assets/'+id+'/return',{method:'POST'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已归还');loadAssets();}else alert(res.error);});}
function repairAsset(id){if(!confirm('确认标记为报修？'))return;fetch('/api/assets/'+id+'/repair',{method:'POST'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已报修');loadAssets();}else alert(res.error);});}
function scrapAsset(id){if(!confirm('确认报废该资产？'))return;fetch('/api/assets/'+id+'/scrap',{method:'POST'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已报废');loadAssets();}else alert(res.error);});}

// ===== 借还记录 =====
function loadBorrows(){
  fetch('/api/borrows').then(r=>r.json()).then(rows=>{
    $('borrowCount').textContent='共 '+rows.length+' 条';
    const tb=$('borrowBody');
    if(!rows.length){tb.innerHTML='<tr><td colspan="8" class="empty">暂无借还记录</td></tr>';return;}
    tb.innerHTML=rows.map(r=>'<tr><td>'+r.id+'</td><td>'+esc(r.asset_name)+'</td><td>'+esc(r.name)+'</td><td>'+r.qty+'</td><td>'+esc(r.borrow_date||'—')+'</td><td>'+esc(r.return_date||'—')+'</td><td><span class="'+tag(r.status)+'">'+esc(r.status)+'</span></td><td>'+esc(r.note||'—')+'</td></tr>').join('');
  });
}
// ===== 采购申请 =====
function toggleProcForm(){const f=$('procForm');f.classList.toggle('open');if(!f.classList.contains('open')){$('pf_name').value='';$('pf_qty').value='1';$('pf_reason').value='';$('pfErr').textContent='';}}
function saveProc(){
  const d={name:$('pf_name').value.trim(),category:$('pf_cat').value,qty:$('pf_qty').value,reason:$('pf_reason').value.trim()};
  if(!d.name){$('pfErr').textContent='请输入物品名称';return;}
  fetch('/api/procurements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).then(res=>{
    if(res.ok){toast('已提交，等待审批');toggleProcForm();loadProcs();}else{$('pfErr').textContent=res.error||'失败';}
  });
}
function loadProcs(){
  fetch('/api/procurements').then(r=>r.json()).then(rows=>{
    $('procCount').textContent='共 '+rows.length+' 条';
    const tb=$('procBody');
    if(!rows.length){tb.innerHTML='<tr><td colspan="8" class="empty">暂无采购申请</td></tr>';return;}
    tb.innerHTML=rows.map(r=>{
      let ops='';
      if(r.status==='待审'&&(role==='主席'||role==='副主席'))ops='<span class="op" onclick="approveProc('+r.id+')">通过</span><span class="op del" onclick="rejectProc('+r.id+')">驳回</span>';
      else ops='<span class="op dis">—</span>';
      return '<tr><td>'+r.id+'</td><td><b>'+esc(r.name)+'</b></td><td>'+esc(r.category||'—')+'</td><td>'+r.qty+'</td><td>'+esc(r.reason||'—')+'</td><td>'+esc(r.pname)+'</td><td><span class="'+tag(r.status)+'">'+esc(r.status)+'</span></td><td>'+ops+'</td></tr>';
    }).join('');
  });
}
function approveProc(id){if(!confirm('确认通过？通过后自动入库'))return;fetch('/api/procurements/'+id+'/approve',{method:'POST'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已通过，自动入库');loadProcs();loadAssets();}else alert(res.error);});}
function rejectProc(id){fetch('/api/procurements/'+id+'/reject',{method:'POST'}).then(r=>r.json()).then(res=>{if(res.ok){toast('已驳回');loadProcs();}else alert(res.error);});}
</script>
</body>
